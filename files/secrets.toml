# role = "operator" can edit/delete. role = "viewer" is read-only.
# Replace the demo hashes below before real use. Do NOT commit real passwords.

[operators]
admin = { password_sha256 = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918", role = "operator" }   # password = "admin"
viewer = { password_sha256 = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918", role = "viewer" }    # password = "admin"
